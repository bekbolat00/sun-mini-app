<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sun-yellow: #FFB000; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; padding-bottom: 100px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-premium { background: linear-gradient(145deg, #141414 0%, #0a0a0c 100%); border: 1px solid #1a1a1c; transition: all 0.2s ease; }
        .card-premium:active { transform: scale(0.96); border-color: var(--sun-yellow); }
        .icon-container { border: 1px solid rgba(255, 176, 0, 0.2); box-shadow: 0 0 15px rgba(255, 176, 0, 0.15); }
        .tag-sun { background: rgba(255, 176, 0, 0.1); color: var(--sun-yellow); font-size: 10px; font-weight: bold; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        
        /* Кнопки внизу курса */
        .course-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 20px 35px; border-top: 1px solid #1a1a1c; z-index: 100; display: flex; gap: 12px; }
        .btn-main { flex: 1; background: #fff; color: #000; font-weight: bold; padding: 14px; border-radius: 12px; text-align: center; font-size: 14px; cursor: pointer; }
        .btn-outline { flex: 1; background: #1a1a1c; color: #fff; font-weight: bold; padding: 14px; border-radius: 12px; text-align: center; font-size: 14px; border: 1px solid #2a2a2c; cursor: pointer; }
    </style>
</head>
<body class="pt-6">

    <div id="home-screen" class="screen active px-4">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-5xl font-black tracking-widest mb-1">SUN</h1>
            <p class="text-[10px] font-bold tracking-[0.35em] text-[#FFB000]">INFOBUSINESS</p>
        </div>
        <div class="bg-[#141414] border border-[#1a1a1c] rounded-xl p-3 mb-8 flex items-center">
            <span class="text-gray-500 mr-2">🔍</span>
            <input type="text" placeholder="Поиск по базе знаний..." class="bg-transparent border-none text-white w-full focus:outline-none placeholder-gray-600 text-sm">
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div onclick="showScreen('efiry-screen')" class="card-premium rounded-2xl p-5 h-40 flex flex-col justify-between cursor-pointer">
                <div class="icon-container w-14 h-14 rounded-xl overflow-hidden"><img src="efiry.jpg" class="w-full h-full object-cover"></div>
                <div class="text-lg font-bold uppercase mt-auto">Эфиры</div>
            </div>
            <div onclick="showScreen('kursy-screen')" class="card-premium rounded-2xl p-5 h-40 flex flex-col justify-between cursor-pointer">
                <div class="icon-container w-14 h-14 rounded-xl overflow-hidden"><img src="kursy.jpg" class="w-full h-full object-cover"></div>
                <div class="text-lg font-bold uppercase mt-auto">Курсы</div>
            </div>
            <div onclick="showScreen('razbory-screen')" class="card-premium rounded-2xl p-5 h-40 flex flex-col justify-between cursor-pointer">
                <div class="icon-container w-14 h-14 rounded-xl overflow-hidden"><img src="razbory.jpg" class="w-full h-full object-cover"></div>
                <div class="text-lg font-bold uppercase mt-auto">Разборы</div>
            </div>
            <div onclick="showScreen('knigi-screen')" class="card-premium rounded-2xl p-5 h-40 flex flex-col justify-between cursor-pointer">
                <div class="icon-container w-14 h-14 rounded-xl overflow-hidden"><img src="knigi.jpg" class="w-full h-full object-cover"></div>
                <div class="text-lg font-bold uppercase mt-auto">Книги</div>
            </div>
        </div>
    </div>

    <div id="kursy-screen" class="screen px-4">
        <h2 class="text-xl font-bold uppercase text-center mb-6">Курсы</h2>
        <div id="courses-list">
            </div>
    </div>

    <div id="detail-screen" class="screen">
        <div id="course-header-img" class="w-full h-72 bg-cover bg-center"></div>
        <div class="px-6 -mt-6 bg-black rounded-t-[30px] pt-8 relative z-10">
            <div class="flex justify-between items-start mb-4">
                <span id="course-tag" class="tag-sun">#КАТЕГОРИЯ</span>
                <span class="text-gray-500 text-2xl">☆</span>
            </div>
            <h2 id="course-title" class="text-2xl font-black mb-4 uppercase italic">Название</h2>
            <div id="course-desc" class="text-gray-400 text-sm leading-relaxed mb-6">Описание...</div>
            
            <h4 class="font-bold uppercase text-xs tracking-widest text-gray-500 mb-4">Программа:</h4>
            <ul id="course-program" class="text-sm text-gray-300 space-y-2 mb-20">
                </ul>
        </div>
        
        <div class="course-footer">
            <div class="btn-outline">Конспект</div>
            <div class="btn-main">Смотреть</div>
        </div>
    </div>

    <div id="efiry-screen" class="screen px-4"><h2 class="text-center mt-10 text-gray-500 uppercase font-bold">Эфиры (в разработке)</h2></div>
    <div id="razbory-screen" class="screen px-4"><h2 class="text-center mt-10 text-gray-500 uppercase font-bold">Разборы (в разработке)</h2></div>
    <div id="knigi-screen" class="screen px-4"><h2 class="text-center mt-10 text-gray-500 uppercase font-bold">Книги (в разработке)</h2></div>

    <div class="fixed bottom-0 left-0 w-full bg-[#050505]/95 backdrop-blur-sm border-t border-[#1a1a1c] flex justify-around py-3 pb-8 z-50">
        <div onclick="showScreen('home-screen')" class="flex flex-col items-center text-[#FFB000] cursor-pointer nav-item">
            <span class="text-2xl mb-1">🏠</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Домой</span>
        </div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer nav-item"><span class="text-2xl mb-1">👥</span><span class="text-[10px] font-bold uppercase tracking-wider">Клуб</span></div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer nav-item"><span class="text-2xl mb-1">💬</span><span class="text-[10px] font-bold uppercase tracking-wider">Чаты</span></div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer nav-item"><span class="text-2xl mb-1">⭐</span><span class="text-[10px] font-bold uppercase tracking-wider">Топ</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); tg.setHeaderColor('#000000');

        const coursesData = [
            {
                id: 1,
                title: "Реальное управление",
                tag: "Команда",
                desc: "Курс по управлению линейными сотрудниками. Как выстроить систему, которая работает без микроменеджмента.",
                img: "kursy.jpg",
                program: ["Техника Яма", "Наука управления людьми", "Делегирование полномочий"]
            },
            {
                id: 2,
                title: "Высокоохватные Reels",
                tag: "Маркетинг",
                desc: "Если твой бизнес не получает заявки через рилсы — вопрос не в формате, а в системе.",
                img: "kursy.jpg",
                program: ["Алгоритмы 2026", "Сценарии на миллион", "Монтаж и свет"]
            }
        ];

        let historyList = ['home-screen'];

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'home-screen') {
                tg.BackButton.hide();
                historyList = ['home-screen'];
            } else {
                if (historyList[historyList.length-1] !== screenId) historyList.push(screenId);
                tg.BackButton.show();
            }
        }

        function renderCourses() {
            const list = document.getElementById('courses-list');
            list.innerHTML = coursesData.map(course => `
                <div onclick="openDetail(${course.id})" class="bg-[#141414] border border-[#1a1a1c] rounded-[20px] overflow-hidden mb-6 cursor-pointer">
                    <div class="h-48 bg-cover bg-center" style="background-image: url('${course.img}')"></div>
                    <div class="p-5">
                        <span class="tag-sun">#${course.tag}</span>
                        <h3 class="text-lg font-bold mt-2">${course.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const course = coursesData.find(c => c.id === id);
            document.getElementById('course-header-img').style.backgroundImage = `url('${course.img}')`;
            document.getElementById('course-tag').innerText = `#${course.tag}`;
            document.getElementById('course-title').innerText = course.title;
            document.getElementById('course-desc').innerText = course.desc;
            document.getElementById('course-program').innerHTML = course.program.map(p => `<li>• ${p}</li>`).join('');
            showScreen('detail-screen');
        }

        tg.BackButton.onClick(() => {
            historyList.pop();
            const prev = historyList[historyList.length - 1];
            showScreen(prev);
        });

        renderCourses();
    </script>
</body>
</html>
