<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --sun-yellow: #FFB000; /* Твой фирменный цвет */
        }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .hidden-screen { display: none; }
        
        /* Премиальные карточки с фоновыми изображениями и сильным затемнением для текста */
        .card-illustrated { 
            background-size: cover;
            background-position: center;
            border: 1px solid #1a1a1c; 
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Плавное затемнение для идеальной читаемости текста */
        .card-illustrated::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; h-full;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }
        
        .card-illustrated:active { 
            transform: scale(0.96); 
            border-color: var(--sun-yellow);
        }

        /* Желтый бейджик */
        .badge-sun {
            background-color: var(--sun-yellow);
            color: #000000;
        }
    </style>
</head>
<body class="pb-24 pt-6">

    <div id="home-screen" class="px-4">
        
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-5xl font-black tracking-widest text-white mb-1">SUN</h1>
            <p class="text-[10px] font-bold tracking-[0.35em] text-[#FFB000]">INFOBUSINESS</p>
        </div>

        <div class="bg-[#141414] border border-[#1a1a1c] rounded-xl p-3 mb-8 flex items-center focus-within:border-[#FFB000] transition-colors">
            <span class="text-gray-500 mr-2">🔍</span>
            <input type="text" placeholder="Поиск по базе знаний..." class="bg-transparent border-none text-white w-full focus:outline-none placeholder-gray-600 text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
            
            <div class="card-illustrated rounded-2xl h-40 flex flex-col justify-between relative cursor-pointer" 
                 style="background-image: url('https://images.unsplash.com/photo-1590602847861-f357a93021be?q=80&w=500');">
                <div class="absolute top-4 right-4 badge-sun rounded-full px-2 py-0.5 flex items-center justify-center text-[11px] font-extrabold z-10">19</div>
                <div class="mt-auto p-5 text-lg font-bold uppercase tracking-wide relative z-10">Эфиры</div>
            </div>

            <div class="card-illustrated rounded-2xl h-40 flex flex-col justify-between relative cursor-pointer" 
                 style="background-image: url('https://images.unsplash.com/photo-1581092160607-ee22621dd758?q=80&w=500');">
                <div class="absolute top-4 right-4 badge-sun rounded-full px-2 py-0.5 flex items-center justify-center text-[11px] font-extrabold z-10">6</div>
                <div class="mt-auto p-5 text-lg font-bold uppercase tracking-wide relative z-10">Курсы</div>
            </div>

            <div class="card-illustrated rounded-2xl h-40 flex flex-col justify-between relative cursor-pointer" 
                 style="background-image: url('https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?q=80&w=500');">
                <div class="absolute top-4 right-4 badge-sun rounded-full px-2 py-0.5 flex items-center justify-center text-[11px] font-extrabold z-10">22</div>
                <div class="mt-auto p-5 text-lg font-bold uppercase tracking-wide relative z-10">Разборы</div>
            </div>

            <div onclick="openBooks()" class="card-illustrated rounded-2xl h-40 flex flex-col justify-between relative cursor-pointer" 
                 style="background-image: url('https://images.unsplash.com/photo-1589998059171-988d887df646?q=80&w=500');">
                <div class="absolute top-4 right-4 badge-sun rounded-full px-2 py-0.5 flex items-center justify-center text-[11px] font-extrabold z-10">10</div>
                <div class="mt-auto p-5 text-lg font-bold uppercase tracking-wide relative z-10">Книги</div>
            </div>

        </div>
    </div>

    <div id="books-screen" class="hidden-screen px-4">
        <div class="flex justify-between items-center mb-6 pt-2">
            <h2 class="text-xl font-bold uppercase tracking-wider w-full text-center">База книг</h2>
        </div>

        <div class="bg-[#141414] border border-[#1a1a1c] rounded-2xl p-5 mb-4 relative">
            <div class="flex justify-between items-center mb-4">
                <span class="font-bold uppercase text-xs text-[#FFB000] tracking-wider">Must Read</span>
                <span class="text-gray-500 text-xl cursor-pointer hover:text-[#FFB000] transition-colors">☆</span>
            </div>
            <div class="w-full h-64 bg-cover bg-center rounded-xl mb-5 border border-gray-800" style="background-image: url('https://m.media-amazon.com/images/I/71Xn+yP2+ZL._AC_UF1000,1000_QL80_.jpg');"></div>
            <h3 class="text-lg font-bold mb-3 leading-tight">Джефф Смарт, Рэнди Стрит <br><span class="text-gray-400 font-normal leading-normal text-sm">Кто. Решите вашу проблему номер один</span></h3>
            <p class="text-gray-400 text-sm leading-relaxed">О том, как находить сильных людей в команду, чтобы перестать тащить всё самому и начать реально расти.</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[#050505]/95 backdrop-blur-sm border-t border-[#1a1a1c] flex justify-around py-3 pb-8 z-50">
        <div onclick="openHome()" class="flex flex-col items-center text-[#FFB000] cursor-pointer transition-colors nav-item">
            <span class="text-2xl mb-1">🏠</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Домой</span>
        </div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer transition-colors nav-item">
            <span class="text-2xl mb-1">👥</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Клуб</span>
        </div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer transition-colors nav-item">
            <span class="text-2xl mb-1">💬</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Чаты</span>
        </div>
        <div class="flex flex-col items-center text-gray-600 cursor-pointer transition-colors nav-item">
            <span class="text-2xl mb-1">⭐</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Топ</span>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#000000');

        function openBooks() {
            document.getElementById('home-screen').classList.add('hidden-screen');
            document.getElementById('books-screen').classList.remove('hidden-screen');
            let navItems = document.querySelectorAll('.nav-item');
            navItems[0].classList.replace('text-[#FFB000]', 'text-gray-600');
        }

        function openHome() {
            document.getElementById('books-screen').classList.add('hidden-screen');
            document.getElementById('home-screen').classList.remove('hidden-screen');
            let navItems = document.querySelectorAll('.nav-item');
            navItems[0].classList.replace('text-gray-600', 'text-[#FFB000]');
        }
    </script>
</body>
</html>
