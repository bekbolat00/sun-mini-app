<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUN App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --sun-yellow: #FFB000; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow-x: hidden; margin: 0; padding: 0; }
        
        /* Экраны */
        .screen { display: none; min-height: 100vh; padding-bottom: 120px; box-sizing: border-box; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Категории (как на скрине) */
        .category-card { position: relative; width: 100%; height: 160px; rounded: 20px; overflow: hidden; background-size: cover; background-position: center; cursor: pointer; border: 1px solid #1a1a1c; z-index: 10; }
        .category-card-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); pointer-events: none; }
        .category-card-content { position: absolute; top: 20px; left: 20px; z-index: 20; pointer-events: none; }
        .category-card-title { font-size: 26px; font-weight: 900; text-transform: uppercase; font-style: italic; color: #fff; line-height: 1; }
        
        /* Прогресс-бар под карточкой */
        .progress-box { width: 100%; background: #141414; border: 1px solid #1a1a1c; border-radius: 12px; padding: 10px 15px; margin-top: 8px; margin-bottom: 24px; position: relative; }
        .progress-label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .progress-bar-bg { width: 100%; height: 4px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--sun-yellow); transition: width 0.5s ease; }
        .progress-percent { position: absolute; right: 15px; top: 8px; font-size: 10px; font-weight: 900; color: #fff; }

        /* Навигация (Нижнее меню) */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid #1a1a1c; display: flex; justify-content: space-around; padding: 12px 0 32px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.2s; }
        .nav-item span:first-child { font-size: 22px; margin-bottom: 4px; }
        .nav-item span:last-child { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #666; letter-spacing: 0.05em; }
        .nav-item.active span:last-child { color: var(--sun-yellow); }
        .nav-item.active span:first-child { transform: scale(1.1); }

        /* Карточки в списках */
        .item-card { background: #141414; border: 1px solid #1a1a1c; border-radius: 20px; overflow: hidden; margin-bottom: 20px; cursor: pointer; }
        .tag { background: rgba(255, 176, 0, 0.1); color: var(--sun-yellow); font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        
        /* Кнопки в деталях */
        .footer-btns { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px 20px 35px; border-top: 1px solid #1a1a1c; z-index: 500; display: flex; gap: 10px; }
        .btn-white { flex: 1; background: #fff; color: #000; font-weight: 900; padding: 14px; border-radius: 12px; text-align: center; font-size: 14px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body class="pt-4">

    <div id="home-screen" class="screen active px-5">
        <div class="flex flex-col items-center mb-8">
            <h1 class="text-5xl font-black tracking-widest italic">SUN</h1>
            <p class="text-[10px] font-bold tracking-[0.4em] text-[#FFB000]">INFOBUSINESS</p>
        </div>

        <div id="categories-container">
            </div>
    </div>

    <div id="club-screen" class="screen px-5">
        <h2 class="text-xl font-black uppercase text-center mb-8 mt-4 italic tracking-widest">Сообщество</h2>
        <div class="bg-[#141414] border border-[#1a1a1c] rounded-[24px] p-6 mb-6">
            <h3 class="text-xl font-black mb-1 uppercase italic">SUN CLUB</h3>
            <p class="text-sm text-gray-400 mb-6 italic">Твой доступ к закрытым знаниям и чатам активен.</p>
            <div onclick="tg.openLink('https://pay.kaspi.kz/pay/0o2tyjk1')" class="w-full bg-[#FFB000] text-black text-center font-bold py-4 rounded-xl uppercase text-xs tracking-widest cursor-pointer">
                Продлить доступ
            </div>
        </div>
    </div>

    <div id="list-screen" class="screen px-5">
        <h2 id="list-title" class="text-xl font-black uppercase text-center mb-8 mt-4 italic">Загрузка...</h2>
        <div id="items-list"></div>
    </div>

    <div id="detail-screen" class="screen">
        <div id="detail-img" class="w-full h-80 bg-cover bg-center"></div>
        <div class="px-6 -mt-8 bg-black rounded-t-[32px] pt-8 relative z-10">
            <h2 id="detail-title" class="text-2xl font-black mb-4 uppercase italic">Название</h2>
            <div id="detail-desc" class="text-gray-400 text-sm leading-relaxed mb-32 whitespace-pre-wrap"></div>
        </div>
        <div class="footer-btns">
            <div id="watch-btn" class="btn-white">Смотреть</div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="showScreen('home-screen')" class="nav-item active" id="nav-home">
            <span>🏠</span><span>Домой</span>
        </div>
        <div onclick="showScreen('club-screen')" class="nav-item" id="nav-club">
            <span>👥</span><span>Клуб</span>
        </div>
        <div onclick="tg.showAlert('Чаты появятся в следующем обновлении!')" class="nav-item">
            <span>💬</span><span>Чаты</span>
        </div>
        <div onclick="tg.showAlert('Избранное скоро заработает!')" class="nav-item">
            <span>⭐</span><span>Избранное</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand(); tg.setHeaderColor('#000000');

        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4MBQNze85Cb2YOXQOIMdsQI-94xxAIp-KuQgYmiHaaXS5besYLMrNwwdFfeeqg1wZKQJ-0wfwnTFm/pub?output=csv&v=" + Date.now();
        
        let globalData = [];
        let userProgress = JSON.parse(localStorage.getItem('sun_progress')) || {};

        Papa.parse(sheetUrl, {
            download: true,
            header: false,
            complete: function(results) {
                let rows = results.data.slice(1);
                globalData = rows.map(r => ({
                    id: r[0], category: r[1] || '', tag: r[2] || '', title: r[3] || '', desc: r[4] || '', img: r[5] || '', link: r[6] || ''
                })).filter(i => i.id);
                renderHome();
            }
        });

        function renderHome() {
            const categories = [
                { id: 'Эфир', title: 'Книги', img: 'efiry.jpg' },
                { id: 'Курс', title: 'Курсы', img: 'kursy.jpg' },
                { id: 'Разбор', title: 'Разборы', img: 'razbory.jpg' },
                { id: 'Книг', title: 'Фильмы', img: 'knigi.jpg' }
            ];

            let html = '';
            categories.forEach(cat => {
                const catItems = globalData.filter(i => i.category.includes(cat.id));
                const total = catItems.length;
                const done = catItems.filter(i => userProgress[i.id] == 100).length;
                const percent = total > 0 ? Math.round((done / total) * 100) : 0;

                html += `
                    <div onclick="openCategory('${cat.id}', '${cat.title}')" class="category-card rounded-[24px]" style="background-image: url('${cat.img}')">
                        <div class="category-card-overlay"></div>
                        <div class="category-card-content">
                            <div class="category-card-title">${cat.title}</div>
                        </div>
                    </div>
                    <div class="progress-box">
                        <span class="progress-label">Твой прогресс</span>
                        <span class="progress-percent">${percent}%</span>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('categories-container').innerHTML = html;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            // Подсветка меню
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(screenId === 'home-screen') document.getElementById('nav-home').classList.add('active');
            if(screenId === 'club-screen') document.getElementById('nav-club').classList.add('active');

            if (screenId === 'home-screen') { tg.BackButton.hide(); } else { tg.BackButton.show(); }
        }

        function openCategory(kw, title) {
            document.getElementById('list-title').innerText = title;
            const items = globalData.filter(i => i.category.includes(kw));
            document.getElementById('items-list').innerHTML = items.map(i => `
                <div onclick="openDetail('${i.id}')" class="item-card">
                    <div class="h-48 bg-cover bg-center" style="background-image: url('${i.img}')"></div>
                    <div class="p-5">
                        <span class="tag">#${i.tag}</span>
                        <h3 class="text-lg font-black italic uppercase mt-2">${i.title}</h3>
                    </div>
                </div>
            `).join('');
            showScreen('list-screen');
        }

        function openDetail(id) {
            const i = globalData.find(d => d.id == id);
            document.getElementById('detail-img').style.backgroundImage = `url('${i.img}')`;
            document.getElementById('detail-title').innerText = i.title;
            document.getElementById('detail-desc').innerText = i.desc;
            document.getElementById('watch-btn').onclick = () => {
                userProgress[id] = 100;
                localStorage.setItem('sun_progress', JSON.stringify(userProgress));
                renderHome();
                tg.openLink(i.link);
            };
            showScreen('detail-screen');
        }

        tg.BackButton.onClick(() => showScreen('home-screen'));
    </script>
</body>
</html>
